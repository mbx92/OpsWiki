# Coolify — OpsWiki (app only)
#
# PostgreSQL pakai instance yang sudah ada di Coolify.
# Set DB_HOST / DB_* di Environment Variables Coolify (hostname internal DB).
#
# Alur deploy (data tetap aman):
# - entrypoint: php artisan migrate --force (hanya migration baru)
# - opswiki:bootstrap (seed sekali jika plans belum ada)
# - Redeploy tidak reset database

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    environment:
      APP_NAME: ${APP_NAME:-OpsWiki}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-true}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      SAAS_CENTRAL_DOMAIN: ${SAAS_CENTRAL_DOMAIN}
      SAAS_DEFAULT_TENANT_SLUG: ${SAAS_DEFAULT_TENANT_SLUG:-default}
      SAAS_DEFAULT_CURRENCY: ${SAAS_DEFAULT_CURRENCY:-IDR}
      SAAS_REGISTRATION_ENABLED: ${SAAS_REGISTRATION_ENABLED:-true}
      SAAS_DNS_CNAME_TARGET: ${SAAS_DNS_CNAME_TARGET:-}
      SAAS_DNS_A_RECORD_IP: ${SAAS_DNS_A_RECORD_IP:-}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-OpsWiki Admin}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_SYNC_PASSWORD: ${SUPER_ADMIN_SYNC_PASSWORD:-false}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@opswiki.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-OpsWiki}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      VITE_APP_NAME: ${APP_NAME:-OpsWiki}
    volumes:
      - opswiki_storage:/var/www/html/storage/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  opswiki_storage:
